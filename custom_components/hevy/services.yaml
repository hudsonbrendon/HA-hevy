log_body_measurement:
  name: Log body measurement
  description: >
    Record a body measurement on Hevy for the given date. If an entry already
    exists for that date it is overwritten. At least one measurement field is
    required.
  fields:
    entry_id:
      name: Config entry
      description: ID of the Hevy integration to target (omit if only one is configured).
      example: "abc123def456"
      required: false
      selector:
        text:
    date:
      name: Date
      description: Date of the measurement (defaults to today, UTC).
      required: false
      example: "2026-05-17"
      selector:
        date:
    weight_kg:
      name: Weight (kg)
      example: 82.5
      required: false
      selector:
        number:
          min: 1
          max: 500
          step: 0.1
          unit_of_measurement: kg
    fat_percent:
      name: Body fat (%)
      example: 18.5
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 0.1
          unit_of_measurement: "%"
    lean_mass_kg:
      name: Lean mass (kg)
      example: 65.0
      required: false
      selector:
        number:
          min: 1
          max: 500
          step: 0.1
          unit_of_measurement: kg

refresh:
  name: Refresh
  description: Force the Hevy coordinator to poll the API immediately.
  fields:
    entry_id:
      name: Config entry
      description: ID of the Hevy integration to target (omit if only one is configured).
      required: false
      example: "abc123def456"
      selector:
        text:

create_workout:
  name: Create workout
  description: >
    POST a completed workout to Hevy. Useful for scripted/automated logging
    (e.g. tracking treadmill sessions or warmups recorded by another
    integration). Refreshes the coordinator on success.
  fields:
    entry_id:
      name: Config entry
      description: ID of the Hevy integration to target (omit if only one is configured).
      required: false
      example: "abc123def456"
      selector:
        text:
    title:
      name: Title
      required: true
      example: "Morning Cardio"
      selector:
        text:
    description:
      name: Description
      required: false
      example: "30 min steady state on the treadmill"
      selector:
        text:
          multiline: true
    start_time:
      name: Start time (ISO 8601)
      required: true
      example: "2026-05-17T07:30:00Z"
      selector:
        datetime:
    end_time:
      name: End time (ISO 8601)
      required: true
      example: "2026-05-17T08:00:00Z"
      selector:
        datetime:
    is_private:
      name: Private
      description: Hide the workout from your public Hevy profile.
      required: false
      default: false
      selector:
        boolean:
    exercises:
      name: Exercises
      description: >
        List of exercise objects. Each must have exercise_template_id and a
        sets list. Each set may include type, weight_kg, reps,
        distance_meters, duration_seconds, custom_metric and rpe.
      required: true
      example: |
        - exercise_template_id: "D04AC939"
          sets:
            - type: normal
              weight_kg: 100
              reps: 8
      selector:
        object:
